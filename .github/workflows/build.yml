name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
    paths-ignore:
      - "*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build and zip
        run: |
          bun zip
          bun zip:firefox
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extension
          path: dist/*.zip
